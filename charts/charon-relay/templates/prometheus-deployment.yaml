{{- if .Values.centralMonitoring.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ include "release.name" . }}-prometheus
  name: {{ include "release.name" . }}-prometheus
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "release.name" . }}-prometheus
  template:
    metadata:
      labels:
        app: {{ include "release.name" . }}-prometheus
    spec:
      containers:
      - name: prometheus
        image: {{ .Values.centralMonitoring.image | default "prom/prometheus:v2.55.1" }}
        args:
        - --config.file=/etc/prometheus/prometheus.yaml
        - --enable-feature=agent
        - --storage.agent.retention.max-time=30m
        ports:
        - containerPort: 9090
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - mountPath: /etc/prometheus/prometheus.yaml
          name: config
          subPath: prometheus.yaml
{{- if .Values.centralMonitoring.existingSecret.name }}
        - mountPath: /etc/secrets/monitoring-token
          name: monitoring-token
          readOnly: true
{{- end }}
      securityContext:
        runAsUser: 0
        runAsNonRoot: false
      volumes:
      - name: config
        configMap:
          name: {{ include "release.name" . }}-prometheus
{{- if .Values.centralMonitoring.existingSecret.name }}
      - name: monitoring-token
        secret:
          secretName: {{ .Values.centralMonitoring.existingSecret.name }}
{{- end }}
{{- end }}
