{{- if .Values.serviceMonitor.enabled }}
{{- range $i := until (int .Values.clusterSize) }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "relay.serviceAccountName" $ }}-{{ $i }}
  {{- if $.Values.serviceMonitor.namespace }}
  namespace: {{ $.Values.serviceMonitor.namespace }}
  {{- end }}
  labels:
    name: {{ include "release.name" $ }}-{{ $i }}
  {{- if $.Values.serviceMonitor.annotations }}
  annotations:
  {{- toYaml $.Values.serviceMonitor.annotations | nindent 4 }}
  {{- end }}
spec:
  endpoints:
  - interval: {{ $.Values.serviceMonitor.interval }}
    {{- if $.Values.serviceMonitor.scrapeTimeout }}
    scrapeTimeout: {{ $.Values.serviceMonitor.scrapeTimeout }}
    {{- end }}
    honorLabels: true
    port: {{ $.Values.service.ports.monitoring.name }}
    path: {{ $.Values.serviceMonitor.path }}
    scheme: {{ $.Values.serviceMonitor.scheme }}
    {{- if $.Values.serviceMonitor.tlsConfig }}
    tlsConfig:
    {{- toYaml $.Values.serviceMonitor.tlsConfig | nindent 6 }}
    {{- end }}
    {{- if $.Values.serviceMonitor.relabelings }}
    relabelings:
    {{- toYaml $.Values.serviceMonitor.relabelings | nindent 4 }}
    {{- end }}
  jobLabel: "{{ $.Release.Name }}-{{ $i }}"
  selector:
    matchLabels:
      {{- if $.Values.metricsService.enabled }}
      name: {{ include "release.name" $ }}-{{ $i }}-metrics
      {{- else }}
      name: {{ include "release.name" $ }}-{{ $i }}
      {{- end }}
  namespaceSelector:
    matchNames:
      - {{ $.Release.Namespace }}
{{- end }}
{{- end }}
