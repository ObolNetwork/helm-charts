apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "relay.fullname" . }}-test-connection"
  labels:
    {{- include "relay.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "release.name" . }}-0:{{ .Values.service.ports.http.port }}']
  restartPolicy: Never
